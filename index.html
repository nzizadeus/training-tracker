<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Training tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#24413B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --chalk:#F5F2EA;
    --chalk-card:#FFFFFF;
    --ink:#16211F;
    --ink-soft:#3C4A47;
    --line:#DEDACE;
    --court:#24413B;
    --court-soft:#5B746F;
    --rope:#D9491F;
    --rope-soft:#F1DCD3;
    --brass:#8A6A22;
    --brass-fill:#C99A3B;
    --brass-soft:#F2E7CE;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --chalk:#12181A;
      --chalk-card:#1B2426;
      --ink:#F2EEE6;
      --ink-soft:#B7C2BE;
      --line:#33403E;
      --court:#7FA79C;
      --court-soft:#8FA7A1;
      --rope:#E8683B;
      --rope-soft:#3A2620;
      --brass:#D9AE5C;
      --brass-fill:#D9AE5C;
      --brass-soft:#3A311D;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--chalk); color:var(--ink);
    font-family:'Inter',sans-serif; padding:24px 20px 48px;
  }
  .wrap{max-width:520px; margin:0 auto;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--court-soft); margin:0 0 4px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:.02em;
    margin:0 0 20px; color:var(--ink); font-weight:400;
  }
  .stage{
    background:var(--chalk-card); border:1px solid var(--line); border-radius:14px;
    padding:20px 20px 16px; margin-bottom:14px;
  }
  .stage-top{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;}
  .big-num{font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:1; color:var(--ink);}
  .big-num span{font-size:22px; color:var(--ink-soft); font-family:'Inter',sans-serif; margin-left:6px;}
  .goal-edit{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--court-soft);
    background:none; border:none; text-align:right; cursor:pointer;
  }
  .goal-edit input{
    width:44px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--court-soft);
    background:var(--chalk); border:1px solid var(--line); border-radius:4px; padding:2px 4px;
  }
  svg#coil{display:block; width:100%; height:64px; margin-bottom:6px;}
  .stage-foot{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-soft);}
  .stage-foot b{color:var(--ink); font-weight:600;}
  .breakdown{font-size:12px; color:var(--ink-soft); margin-top:8px; font-family:'JetBrains Mono',monospace;}
  .streak{
    display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace;
    font-size:12px; background:var(--brass-soft); color:var(--brass); padding:3px 9px; border-radius:100px;
    margin-top:10px;
  }
  .strength-card{
    background:var(--chalk-card); border:1px solid var(--line); border-radius:14px;
    padding:16px 20px; margin-bottom:22px; display:flex; justify-content:space-between; align-items:center;
  }
  .strength-card .label{font-size:13px; color:var(--ink-soft);}
  .strength-card .val{font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--ink);}
  .strength-card .val span{font-size:14px; color:var(--ink-soft); font-family:'Inter',sans-serif; margin-left:4px;}
  form{
    background:var(--chalk-card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; margin-bottom:22px; display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  form .full{grid-column:1/-1;}
  label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); display:block; margin-bottom:4px;}
  input[type=date], input[type=number], input[type=text]{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    background:var(--chalk); color:var(--ink); font-family:'Inter',sans-serif; font-size:14px;
  }
  .type-chips{display:flex; gap:8px;}
  .type-chip{
    flex:1; text-align:center; padding:9px 4px; border:1px solid var(--line); border-radius:8px;
    font-size:13px; cursor:pointer; background:var(--chalk); color:var(--ink-soft);
  }
  .type-chip.active[data-type="rope"]{background:var(--rope-soft); border-color:var(--rope); color:var(--rope);}
  .type-chip.active[data-type="treadmill"]{background:var(--rope-soft); border-color:var(--rope); color:var(--rope);}
  .type-chip.active[data-type="strength"]{background:var(--brass-soft); border-color:var(--brass-fill); color:var(--brass);}
  button.add{
    grid-column:1/-1; background:var(--court); color:var(--chalk); border:none; border-radius:8px;
    padding:11px; font-size:14px; font-weight:600; cursor:pointer; margin-top:2px;
  }
  button.add:active{transform:scale(0.99);}
  .exercise-block{
    border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:8px; background:var(--chalk);
  }
  .exercise-head{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .exercise-head input{flex:1;}
  .remove-exercise, .remove-set, .add-set{
    background:none; border:1px solid var(--line); border-radius:6px; color:var(--ink-soft);
    font-size:12px; padding:4px 8px; cursor:pointer; white-space:nowrap;
  }
  .remove-exercise:hover, .remove-set:hover{color:var(--rope); border-color:var(--rope);}
  .set-row{display:grid; grid-template-columns:24px 1fr 1fr auto; gap:6px; align-items:center; margin-bottom:6px;}
  .set-row .set-idx{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); text-align:center;}
  .set-row input{padding:6px 8px; font-size:13px;}
  .add-exercise-btn{
    grid-column:1/-1; background:none; border:1px dashed var(--line); border-radius:8px; color:var(--court-soft);
    padding:9px; font-size:13px; cursor:pointer; margin-bottom:2px;
  }
  .section-label{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--court-soft); margin:0 0 10px; display:flex; justify-content:space-between; align-items:center;
  }
  .filter-chips{display:flex; gap:6px;}
  .filter-chip{
    font-family:'Inter',sans-serif; font-size:12px; padding:4px 10px; border-radius:100px;
    border:1px solid var(--line); background:var(--chalk-card); color:var(--ink-soft); cursor:pointer;
  }
  .filter-chip.active{background:var(--court); color:var(--chalk); border-color:var(--court);}
  .week-group{margin-bottom:18px;}
  .week-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;
  }
  .week-head .wk{font-size:13px; font-weight:600; color:var(--ink);}
  .week-head .tot{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft);}
  .week-head .tot.hit{color:var(--rope); font-weight:500;}
  .sess-row{
    display:flex; justify-content:space-between; align-items:center; padding:9px 0;
    border-bottom:1px solid var(--line); font-size:14px; gap:8px;
  }
  .sess-card{padding:10px 0; border-bottom:1px solid var(--line);}
  .sess-card:last-child, .sess-row:last-child{border-bottom:none;}
  .sess-card-head{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .sess-date{color:var(--ink-soft); font-family:'JetBrains Mono',monospace; font-size:12px; min-width:70px;}
  .type-tag{
    font-size:10px; text-transform:uppercase; letter-spacing:.04em; padding:2px 6px; border-radius:4px;
    font-weight:600; white-space:nowrap;
  }
  .type-tag.rope{background:var(--rope-soft); color:var(--rope);}
  .type-tag.treadmill{background:var(--rope-soft); color:var(--rope);}
  .type-tag.strength{background:var(--brass-soft); color:var(--brass);}
  .sess-note{color:var(--ink-soft); font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sess-min{font-weight:600; margin-right:2px; white-space:nowrap;}
  .del{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:16px; line-height:1; padding:2px 4px; margin-left:auto;}
  .del:hover{color:var(--rope);}
  .ex-line{font-size:13px; color:var(--ink-soft); padding:2px 0 2px 78px;}
  .ex-line b{color:var(--ink); font-weight:600;}
  .empty{color:var(--ink-soft); font-size:13px; padding:20px 0; text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Training log</p>
  <h1>This week's training</h1>

  <div class="stage">
    <div class="stage-top">
      <div class="big-num" id="weekMin">0<span id="goalLabel">/ 150 min cardio</span></div>
      <div class="goal-edit" id="goalEditWrap">edit goal</div>
    </div>
    <svg id="coil" viewBox="0 0 500 64" preserveAspectRatio="none"></svg>
    <div class="stage-foot">
      <span id="pctLabel">0% of goal</span>
      <span id="remainLabel"><b>150</b> min to go</span>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <div class="streak" id="streakBadge" style="display:none;"></div>
  </div>

  <div class="strength-card">
    <div>
      <div class="label">Strength this week</div>
      <div class="val" id="strengthVal">0<span>sessions &middot; 0 sets</span></div>
    </div>
  </div>

  <form id="logForm">
    <div class="full">
      <label>Workout type</label>
      <div class="type-chips" id="typeChips">
        <div class="type-chip active" data-type="rope">Rope skipping</div>
        <div class="type-chip" data-type="treadmill">Treadmill incline</div>
        <div class="type-chip" data-type="strength">Strength</div>
      </div>
    </div>
    <div>
      <label for="fDate">Date</label>
      <input type="date" id="fDate" required>
    </div>
    <div id="cardioFields">
      <label for="fMin">Minutes</label>
      <input type="number" id="fMin" min="1" max="300" placeholder="15">
    </div>

    <div class="full" id="strengthFields" style="display:none;">
      <label>Exercises</label>
      <div id="exerciseList"></div>
      <button type="button" class="add-exercise-btn" id="addExerciseBtn">+ Add exercise</button>
    </div>

    <div class="full">
      <label for="fNote">Note (optional)</label>
      <input type="text" id="fNote" placeholder="e.g. incline 8%, or felt strong today">
    </div>
    <button type="submit" class="add">Log session</button>
  </form>

  <div class="section-label">
    <span>History</span>
    <div class="filter-chips" id="filterChips">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="rope">Rope</div>
      <div class="filter-chip" data-filter="treadmill">Treadmill</div>
      <div class="filter-chip" data-filter="strength">Strength</div>
    </div>
  </div>
  <div id="history"></div>
</div>

<script>
const GOAL_KEY = 'rope-settings';
const SESS_KEY = 'rope-sessions';
const CARDIO_TYPES = ['rope','treadmill'];
let sessions = [];
let goalMinutes = 150;
let selectedType = 'rope';
let activeFilter = 'all';

function pad(n){return n.toString().padStart(2,'0');}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function parseDate(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function mondayOf(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function weekKey(date){
  const mon = mondayOf(date);
  return mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());
}
function fmtShort(date){
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function typeLabel(t){
  return t === 'rope' ? 'Rope' : t === 'treadmill' ? 'Treadmill' : 'Strength';
}

async function load(){
  try{
    const raw = localStorage.getItem(SESS_KEY);
    sessions = raw ? JSON.parse(raw) : [];
    sessions.forEach(s=>{ if(!s.type) s.type = 'rope'; });
  }catch(e){ sessions = []; }
  try{
    const raw = localStorage.getItem(GOAL_KEY);
    goalMinutes = raw ? JSON.parse(raw).goalMinutes : 150;
  }catch(e){ goalMinutes = 150; }
  render();
}

async function save(){
  try{ localStorage.setItem(SESS_KEY, JSON.stringify(sessions)); }
  catch(e){ console.error('save failed', e); }
}
async function saveGoal(){
  try{ localStorage.setItem(GOAL_KEY, JSON.stringify({goalMinutes})); }
  catch(e){ console.error('save goal failed', e); }
}

function weekSessions(wk){
  return sessions.filter(s => weekKey(parseDate(s.date)) === wk);
}
function currentCardioTotal(){
  const wk = weekKey(new Date());
  return weekSessions(wk).filter(s=>CARDIO_TYPES.includes(s.type)).reduce((a,s)=>a+(s.minutes||0),0);
}
function currentStrength(){
  const wk = weekKey(new Date());
  const list = weekSessions(wk).filter(s=>s.type==='strength');
  let sets = 0;
  list.forEach(s=>{
    if(s.exercises){ s.exercises.forEach(ex=>{ sets += ex.sets.length; }); }
  });
  return { count: list.length, sets };
}
function currentBreakdown(){
  const wk = weekKey(new Date());
  const list = weekSessions(wk).filter(s=>CARDIO_TYPES.includes(s.type));
  const rope = list.filter(s=>s.type==='rope').reduce((a,s)=>a+(s.minutes||0),0);
  const tread = list.filter(s=>s.type==='treadmill').reduce((a,s)=>a+(s.minutes||0),0);
  return {rope, tread};
}

function weeklyStreak(){
  const totalsByWeek = {};
  sessions.filter(s=>CARDIO_TYPES.includes(s.type)).forEach(s=>{
    const k = weekKey(parseDate(s.date));
    totalsByWeek[k] = (totalsByWeek[k]||0) + (s.minutes||0);
  });
  const curKey = weekKey(new Date());
  const curTotal = totalsByWeek[curKey] || 0;
  if(curTotal < goalMinutes) return 0;
  let streak = 0;
  let checkDate = mondayOf(new Date());
  while(true){
    const k = weekKey(checkDate);
    const tot = totalsByWeek[k] || 0;
    if(tot >= goalMinutes){
      streak++;
      checkDate.setDate(checkDate.getDate() - 7);
    } else break;
  }
  return streak;
}

function drawCoil(pct){
  const svg = document.getElementById('coil');
  const w = 500, h = 64;
  const segments = 6;
  let path = 'M 4 32 ';
  const segW = (w-8)/segments;
  for(let i=0;i<segments;i++){
    const x1 = 4 + segW*i + segW*0.5;
    const y = i % 2 === 0 ? 8 : 56;
    const x2 = 4 + segW*(i+1);
    path += `Q ${x1} ${y} ${x2} 32 `;
  }
  const filled = Math.min(pct,1);
  const color = pct >= 1 ? 'var(--rope)' : 'var(--court)';
  svg.innerHTML = `
    <path d="${path}" fill="none" stroke="var(--line)" stroke-width="6" stroke-linecap="round"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
  `;
  const pathEl = svg.querySelectorAll('path')[1];
  const len = pathEl.getTotalLength();
  pathEl.setAttribute('stroke-dasharray', len);
  pathEl.setAttribute('stroke-dashoffset', len - len*filled);
  pathEl.style.transition = 'stroke-dashoffset .5s ease';
}

function render(){
  const total = currentCardioTotal();
  const pct = goalMinutes > 0 ? total/goalMinutes : 0;
  document.getElementById('weekMin').innerHTML = total + `<span>/ ${goalMinutes} min cardio</span>`;
  document.getElementById('pctLabel').textContent = Math.round(pct*100) + '% of goal';
  const remain = Math.max(goalMinutes-total,0);
  document.getElementById('remainLabel').innerHTML = remain>0 ? `<b>${remain}</b> min to go` : `<b>Goal met</b>`;
  drawCoil(pct);

  const bd = currentBreakdown();
  document.getElementById('breakdown').textContent = `Rope ${bd.rope}m  \u00b7  Treadmill ${bd.tread}m`;

  const streak = weeklyStreak();
  const badge = document.getElementById('streakBadge');
  if(streak > 0){
    badge.style.display = 'inline-flex';
    badge.innerHTML = `<i>&#9679;</i> ${streak} week${streak>1?'s':''} streak`;
  } else {
    badge.style.display = 'none';
  }

  const st = currentStrength();
  document.getElementById('strengthVal').innerHTML = `${st.count}<span>session${st.count===1?'':'s'} &middot; ${st.sets} set${st.sets===1?'':'s'}</span>`;

  renderHistory();
}

function formatExerciseLine(ex){
  const sets = ex.sets;
  if(sets.length === 0) return `<b>${ex.name}</b>`;
  const allSame = sets.every(s => s.reps === sets[0].reps && s.weight === sets[0].weight);
  if(allSame){
    return `<b>${ex.name}</b> \u2014 ${sets.length} x ${sets[0].reps} @ ${sets[0].weight}kg`;
  }
  const detail = sets.map(s => `${s.reps}@${s.weight}kg`).join(', ');
  return `<b>${ex.name}</b> \u2014 ${detail}`;
}

function renderHistory(){
  const container = document.getElementById('history');
  const filtered = activeFilter === 'all' ? sessions : sessions.filter(s=>s.type===activeFilter);
  if(filtered.length === 0){
    container.innerHTML = '<div class="empty">No sessions logged yet for this filter.</div>';
    return;
  }
  const byWeek = {};
  filtered.forEach(s=>{
    const k = weekKey(parseDate(s.date));
    if(!byWeek[k]) byWeek[k] = [];
    byWeek[k].push(s);
  });
  const weeks = Object.keys(byWeek).sort().reverse();
  container.innerHTML = weeks.map(wk=>{
    const list = byWeek[wk].sort((a,b)=> b.date.localeCompare(a.date));
    const cardioTotal = list.filter(s=>CARDIO_TYPES.includes(s.type)).reduce((a,s)=>a+(s.minutes||0),0);
    const monDate = parseDate(wk);
    const sunDate = new Date(monDate); sunDate.setDate(sunDate.getDate()+6);
    const label = fmtShort(monDate) + ' \u2013 ' + fmtShort(sunDate);
    const hit = cardioTotal >= goalMinutes;
    const strengthSets = list.filter(s=>s.type==='strength').reduce((a,s)=>a + (s.exercises ? s.exercises.reduce((x,ex)=>x+ex.sets.length,0) : 0), 0);
    const totLabel = activeFilter === 'strength'
      ? `${strengthSets} sets logged`
      : `${cardioTotal} / ${goalMinutes} min cardio`;
    const rows = list.map(s=>{
      if(s.type === 'strength'){
        const exLines = s.exercises ? s.exercises.map(ex=>`<div class="ex-line">${formatExerciseLine(ex)}</div>`).join('') : (s.minutes ? `<div class="ex-line">${s.minutes} min (legacy entry)</div>` : '');
        return `
        <div class="sess-card">
          <div class="sess-card-head">
            <span class="sess-date">${fmtShort(parseDate(s.date))}</span>
            <span class="type-tag strength">Strength</span>
            <span class="sess-note">${s.note ? s.note.replace(/</g,'&lt;') : ''}</span>
            <button class="del" data-id="${s.id}" aria-label="Delete session">&times;</button>
          </div>
          ${exLines}
        </div>`;
      }
      return `
      <div class="sess-row">
        <span class="sess-date">${fmtShort(parseDate(s.date))}</span>
        <span class="type-tag ${s.type}">${typeLabel(s.type)}</span>
        <span class="sess-note">${s.note ? s.note.replace(/</g,'&lt;') : ''}</span>
        <span class="sess-min">${s.minutes}m</span>
        <button class="del" data-id="${s.id}" aria-label="Delete session">&times;</button>
      </div>
    `;
    }).join('');
    return `
      <div class="week-group">
        <div class="week-head">
          <span class="wk">${label}</span>
          <span class="tot ${hit && activeFilter!=='strength' ?'hit':''}">${totLabel}</span>
        </div>
        ${rows}
      </div>
    `;
  }).join('');

  container.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-id');
      sessions = sessions.filter(s=>s.id !== id);
      await save();
      render();
    });
  });
}

document.getElementById('fDate').value = todayStr();

function makeSetRow(idx){
  const row = document.createElement('div');
  row.className = 'set-row';
  row.innerHTML = `
    <span class="set-idx">${idx}</span>
    <input type="number" class="set-reps" placeholder="reps" min="1">
    <input type="number" class="set-weight" placeholder="kg" min="0" step="0.5">
    <button type="button" class="remove-set">&times;</button>
  `;
  row.querySelector('.remove-set').addEventListener('click', ()=>{
    row.remove();
    renumberSets(row.closest('.exercise-block'));
  });
  return row;
}
function renumberSets(block){
  block.querySelectorAll('.set-row').forEach((row,i)=>{
    row.querySelector('.set-idx').textContent = i+1;
  });
}
function makeExerciseBlock(){
  const block = document.createElement('div');
  block.className = 'exercise-block';
  block.innerHTML = `
    <div class="exercise-head">
      <input type="text" class="ex-name" placeholder="Exercise, e.g. Bench press">
      <button type="button" class="remove-exercise">Remove</button>
    </div>
    <div class="sets-list"></div>
    <button type="button" class="add-set">+ Add set</button>
  `;
  const setsList = block.querySelector('.sets-list');
  setsList.appendChild(makeSetRow(1));
  block.querySelector('.add-set').addEventListener('click', ()=>{
    setsList.appendChild(makeSetRow(setsList.children.length+1));
  });
  block.querySelector('.remove-exercise').addEventListener('click', ()=>{
    const list = document.getElementById('exerciseList');
    block.remove();
    if(list.children.length === 0) list.appendChild(makeExerciseBlock());
  });
  return block;
}

document.getElementById('addExerciseBtn').addEventListener('click', ()=>{
  document.getElementById('exerciseList').appendChild(makeExerciseBlock());
});
document.getElementById('exerciseList').appendChild(makeExerciseBlock());

document.getElementById('typeChips').addEventListener('click', (e)=>{
  const chip = e.target.closest('.type-chip');
  if(!chip) return;
  selectedType = chip.getAttribute('data-type');
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.toggle('active', c===chip));
  const isStrength = selectedType === 'strength';
  document.getElementById('cardioFields').style.display = isStrength ? 'none' : 'block';
  document.getElementById('strengthFields').style.display = isStrength ? 'block' : 'none';
});

document.getElementById('filterChips').addEventListener('click', (e)=>{
  const chip = e.target.closest('.filter-chip');
  if(!chip) return;
  activeFilter = chip.getAttribute('data-filter');
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active', c===chip));
  renderHistory();
});

document.getElementById('logForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();
  if(!date) return;

  if(selectedType === 'strength'){
    const exercises = [];
    document.querySelectorAll('.exercise-block').forEach(block=>{
      const name = block.querySelector('.ex-name').value.trim();
      if(!name) return;
      const sets = [];
      block.querySelectorAll('.set-row').forEach(row=>{
        const reps = parseInt(row.querySelector('.set-reps').value, 10);
        const weight = parseFloat(row.querySelector('.set-weight').value);
        if(reps > 0 && !isNaN(weight)){
          sets.push({reps, weight});
        }
      });
      if(sets.length > 0) exercises.push({name, sets});
    });
    if(exercises.length === 0) return;
    sessions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), date, note, type: 'strength', exercises });
    document.getElementById('exerciseList').innerHTML = '';
    document.getElementById('exerciseList').appendChild(makeExerciseBlock());
  } else {
    const minutes = parseInt(document.getElementById('fMin').value, 10);
    if(!minutes || minutes <= 0) return;
    sessions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), date, minutes, note, type: selectedType });
    document.getElementById('fMin').value = '';
  }
  await save();
  document.getElementById('fNote').value = '';
  render();
});

document.getElementById('goalEditWrap').addEventListener('click', function(){
  if(this.querySelector('input')) return;
  this.innerHTML = `<input type="number" id="goalInput" value="${goalMinutes}" min="10" step="5">`;
  const inp = document.getElementById('goalInput');
  inp.focus();
  inp.addEventListener('blur', async ()=>{
    const v = parseInt(inp.value,10);
    if(v && v>0) goalMinutes = v;
    await saveGoal();
    document.getElementById('goalEditWrap').innerHTML = 'edit goal';
    render();
  });
  inp.addEventListener('keydown', (ev)=>{ if(ev.key === 'Enter') inp.blur(); });
});

load();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
